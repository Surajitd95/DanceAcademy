<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login – Nritya Arpan</title>
  <meta name="robots" content="noindex, nofollow"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --navy: #0D0F1A; --navy-mid: #141728; --navy-light: #1E2238;
      --gold: #C9A84C; --gold-light: #E2C97A; --ivory: #F5F0E8; --ivory-dim: #D4CCB8;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--navy);
      color: var(--ivory);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background-image: radial-gradient(ellipse at 50% 0%, rgba(201,168,76,0.08) 0%, transparent 60%);
    }
    .login-card {
      width: 100%;
      max-width: 420px;
      background: var(--navy-mid);
      border: 1px solid rgba(201,168,76,0.25);
      border-radius: 8px;
      padding: 48px 40px;
    }
    .login-logo {
      text-align: center;
      margin-bottom: 40px;
    }
    .logo-devanagari {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      color: var(--gold);
      display: block;
    }
    .logo-text {
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ivory-dim);
    }
    .login-title {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      text-align: center;
      margin-top: 8px;
    }
    .form-group { margin-bottom: 20px; }
    .form-group label {
      display: block;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 8px;
    }
    .form-group input {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 4px;
      padding: 13px 16px;
      color: var(--ivory);
      font-size: 0.95rem;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color 0.3s;
    }
    .form-group input:focus { border-color: var(--gold); background: rgba(201,168,76,0.05); }
    .btn-login {
      width: 100%;
      padding: 14px;
      background: var(--gold);
      color: var(--navy);
      border: none;
      border-radius: 4px;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.3s, box-shadow 0.3s;
      margin-top: 8px;
    }
    .btn-login:hover { background: var(--gold-light); box-shadow: 0 0 24px rgba(201,168,76,0.3); }
    .error-msg {
      color: #e07070;
      font-size: 0.82rem;
      text-align: center;
      margin-top: 16px;
      display: none;
    }
    .back-link {
      text-align: center;
      margin-top: 24px;
      font-size: 0.78rem;
      color: var(--ivory-dim);
    }
    .back-link a { color: var(--gold); text-decoration: underline; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">
      <span class="logo-devanagari">नृत्य</span>
      <span class="logo-text">Arpan</span>
      <p class="login-title">Admin Access</p>
    </div>
    <form id="loginForm">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required placeholder="admin" autocomplete="username"/>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required placeholder="••••••••" autocomplete="current-password"/>
      </div>
      <button type="submit" class="btn-login">Sign In</button>
      <p class="error-msg" id="errorMsg">Invalid credentials. Please try again.</p>
    </form>
    <p class="back-link"><a href="../index.html">← Back to website</a></p>
  </div>
  <script>
    const API_BASE = 'http://localhost:8000/api';
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = e.target.querySelector('button');
      btn.textContent = 'Signing in...';
      btn.disabled = true;
      const err = document.getElementById('errorMsg');
      err.style.display = 'none';
      try {
        const res = await fetch(`${API_BASE}/admin/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value,
          }),
        });
        const data = await res.json();
        if (res.ok && data.token) {
          localStorage.setItem('admin_token', data.token);
          window.location.href = 'dashboard.html';
        } else {
          err.style.display = 'block';
        }
      } catch {
        // Dev mode fallback
        if (document.getElementById('username').value === 'admin' &&
            document.getElementById('password').value === 'admin123') {
          localStorage.setItem('admin_token', 'dev_token');
          window.location.href = 'dashboard.html';
        } else {
          err.style.display = 'block';
        }
      }
      btn.textContent = 'Sign In';
      btn.disabled = false;
    });
  </script>
</body>
</html>
